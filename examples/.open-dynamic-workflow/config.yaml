# Generated by open-dynamic-workflow init.
concurrency: 4
defaultProvider: codex
failFast: false
providers:
  codex:
    args:
      - exec
      - --json
      - --ephemeral
    command: codex
    defaultModel: null
  mock:
    args: []
    command: mock
    defaultModel: null
    responses:
      default:
        text: mock response
reporting:
  mode: pretty
  verbose: false
security:
  allowWorkflowImports: false
  passEnv: []
  redactEnv:
    - OPENAI_API_KEY
    - GEMINI_API_KEY
    - GOOGLE_API_KEY
    - "*_KEY"
    - "*_TOKEN"
    - "*_SECRET"
    - PASSWORD
sharedAgents:
  allowDynamicIds: false
  dir: .open-dynamic-workflow/agents
  maxDefinitions: 100
  strictPromptTemplateVariables: true
timeoutMs: 900000
tools:
  concurrency: 4
  dir: .open-dynamic-workflow/tools
  maxDefinitions: 100
workflow:
  discovery:
    include:
      - workflows/**/*.js
      - workflows/**/*.ts
  maxDepth: 8
  maxLoopRounds: 20
